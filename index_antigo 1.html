<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Airball Dynasty League</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --purple-deep: #2D0A4E;
    --purple-mid: #4B1A7A;
    --purple-light: #6B2FA0;
    --orange: #F97316;
    --orange-dark: #EA6A08;
    --black: #0A0A0A;
    --white: #FFFFFF;
    --gray-bg: #F1F1F5;
    --gray-card: #FAFAFA;
    --gray-border: #E2E2E8;
    --gray-text: #6B6B7B;
    --gray-dark: #1A1A2E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--gray-bg);
    color: var(--black);
    min-height: 100vh;
  }

  h1, h2, h3, h4, h5, .oswald { font-family: 'Oswald', sans-serif; }

  /* TOP BAR */
  .topbar {
    background: var(--black);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 38px;
    border-bottom: 1px solid #1f1f2e;
  }
  .topbar-links { display: flex; gap: 0; }
  .topbar-link {
    color: #aaa;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 0 14px;
    height: 38px;
    display: flex;
    align-items: center;
    cursor: pointer;
    border: none;
    background: none;
    transition: color 0.2s, background 0.2s;
    font-family: 'Oswald', sans-serif;
    border-right: 1px solid #222;
  }
  .topbar-link:first-child { border-left: 1px solid #222; }
  .topbar-link:hover, .topbar-link.active { color: var(--orange); background: #111; }
  .topbar-right { color: #555; font-size: 11px; display: flex; align-items: center; gap: 8px; }
  .topbar-season { color: var(--orange); font-weight: 700; font-family: 'Oswald', sans-serif; letter-spacing: 1px; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--purple-deep) 0%, #1a0635 40%, var(--purple-deep) 100%);
    padding: 0 24px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    border-bottom: 2px solid var(--orange);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .menu-btn {
    display: flex; flex-direction: column; gap: 4px;
    cursor: pointer; padding: 6px; border: none; background: none;
  }
  .menu-btn span {
    display: block; width: 22px; height: 2px;
    background: white; border-radius: 2px; transition: 0.2s;
  }
  .menu-label { color: #aaa; font-size: 10px; letter-spacing: 2px; font-weight: 600; font-family: 'Oswald', sans-serif; }

  .logo-area { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--orange) 0%, var(--orange-dark) 50%, #c45a00 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 12px rgba(249,115,22,0.4);
    overflow: hidden;
  }
  .logo-img { width: 100%; height: 100%; object-fit: cover; }
  .logo-text { line-height: 1; }
  .logo-top { font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 400; color: #aaa; letter-spacing: 3px; text-transform: uppercase; }
  .logo-main { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: var(--orange); letter-spacing: 1px; line-height: 1; }
  .logo-sub { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 500; color: #c084fc; letter-spacing: 4px; text-transform: uppercase; }

  .header-brand-text {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--orange);
    text-shadow: 0 2px 10px rgba(249,115,22,0.35), 0 0 22px rgba(107,47,160,0.45);
    white-space: nowrap;
    pointer-events: none;
  }

  .header-right { display: flex; align-items: center; gap: 16px; }
  .search-box {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; padding: 8px 14px; gap: 8px;
    transition: border 0.2s;
  }
  .search-box:focus-within { border-color: var(--orange); }
  .search-box input {
    background: none; border: none; outline: none;
    color: white; font-size: 13px; width: 220px;
  }
  .search-box input::placeholder { color: rgba(255,255,255,0.35); }
  .user-area { display: flex; align-items: center; gap: 8px; }
  .user-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-light), var(--orange));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: white; font-family: 'Oswald', sans-serif;
    border: 2px solid var(--orange);
  }
  .user-name { color: white; font-size: 13px; font-weight: 500; }
  .user-greeting { color: #aaa; font-size: 11px; }

  /* MATCHUPS STRIP */
  .matchups-strip {
    background: var(--gray-dark);
    padding: 0 24px;
    border-bottom: 1px solid #2a2a3e;
  }
  .matchups-scroll {
    display: flex; gap: 0; overflow-x: auto; padding: 0;
    scrollbar-width: none;
  }
  .matchups-scroll::-webkit-scrollbar { display: none; }

  .week-card {
    min-width: 130px; padding: 14px 16px;
    border-right: 1px solid #2a2a3e;
    display: flex; flex-direction: column; justify-content: center; gap: 8px;
  }
  .week-label { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; color: var(--orange); }
  .week-btn {
    background: var(--orange); color: white; border: none;
    font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 1px; padding: 5px 10px; border-radius: 4px; cursor: pointer;
    transition: background 0.2s;
  }
  .week-btn:hover { background: var(--orange-dark); }

  .matchup-card {
    min-width: 200px; padding: 10px 16px;
    border-right: 1px solid #2a2a3e; cursor: pointer;
    transition: background 0.2s;
    display: flex; flex-direction: column; gap: 6px;
  }
  .matchup-card:hover { background: rgba(249,115,22,0.05); }

  .matchup-time {
    display: flex; align-items: center; justify-content: space-between;
  }
  .matchup-when { color: #888; font-size: 10px; font-weight: 600; letter-spacing: 1px; font-family: 'Oswald', sans-serif; }
  .badge-preview { background: #2a2a3e; color: #aaa; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; letter-spacing: 1px; }
  .badge-live { background: #ef4444; color: white; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; letter-spacing: 1px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .matchup-teams {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .team-mini { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .team-mini-icon {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: white; font-family: 'Oswald', sans-serif;
  }
  .team-mini-name { font-size: 9px; color: #999; text-align: center; font-weight: 600; max-width: 60px; line-height: 1.2; }
  .vs-score { text-align: center; }
  .score-display { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; color: white; }
  .score-period { font-size: 9px; color: var(--orange); font-weight: 600; }

  /* MAIN CONTENT */
  .main-wrap { max-width: 1280px; margin: 0 auto; padding: 24px 16px; }

  .content-grid {
    display: grid; grid-template-columns: 1fr 320px;
    gap: 24px;
  }

  /* NEWS AREA */
  .news-grid {
    display: grid; grid-template-rows: auto 1fr;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .featured-card {
    grid-row: 1 / 3; grid-column: 1 / 2;
    border-radius: 16px; overflow: hidden; position: relative;
    min-height: 400px; cursor: pointer;
    background: linear-gradient(135deg, var(--purple-deep) 0%, #0f0520 100%);
  }
  .featured-bg {
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse at 70% 30%, rgba(249,115,22,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(107,47,160,0.3) 0%, transparent 50%),
      linear-gradient(135deg, #1a0635 0%, #0a0015 100%);
  }
  .court-lines {
    position: absolute; inset: 0; opacity: 0.06;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.5) 40px, rgba(255,255,255,0.5) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.3) 80px, rgba(255,255,255,0.3) 81px);
  }
  .ball-deco {
    position: absolute; right: -40px; top: -40px;
    width: 220px; height: 220px; border-radius: 50%;
    border: 3px solid rgba(249,115,22,0.2);
    box-shadow: inset 0 0 60px rgba(249,115,22,0.1);
  }
  .ball-deco::after {
    content: ''; position: absolute; inset: 20px; border-radius: 50%;
    border: 2px solid rgba(249,115,22,0.15);
  }
  .featured-content {
    position: relative; z-index: 2; height: 100%;
    display: flex; flex-direction: column; justify-content: flex-end; padding: 28px;
  }
  .featured-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--orange); color: white;
    font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px;
    padding: 4px 12px; border-radius: 4px; width: fit-content; margin-bottom: 12px;
  }
  .featured-title {
    font-family: 'Oswald', sans-serif; font-size: 28px; font-weight: 700;
    color: white; line-height: 1.2; margin-bottom: 16px;
  }
  .featured-bullets { display: flex; flex-direction: column; gap: 6px; }
  .featured-bullet {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: rgba(255,255,255,0.75);
  }
  .featured-bullet::before {
    content: ''; width: 4px; height: 4px; border-radius: 50%;
    background: var(--orange); flex-shrink: 0;
  }
  .featured-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1);
  }
  .featured-mvp { display: flex; align-items: center; gap: 8px; }
  .mvp-icon { font-size: 18px; }
  .mvp-label { color: rgba(255,255,255,0.5); font-size: 11px; }
  .mvp-name { color: var(--orange); font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 14px; }
  .featured-time { color: rgba(255,255,255,0.4); font-size: 11px; }

  .side-news {
    border-radius: 12px; overflow: hidden; position: relative;
    min-height: 190px; cursor: pointer;
  }
  .side-news-bg {
    position: absolute; inset: 0;
  }
  .side-news-content {
    position: relative; z-index: 2; padding: 20px;
    height: 100%; display: flex; flex-direction: column; justify-content: flex-end;
  }
  .news-cat {
    font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px;
    padding: 3px 8px; border-radius: 3px; display: inline-block; width: fit-content; margin-bottom: 8px;
  }
  .cat-rules { background: #7c3aed; color: white; }
  .cat-market { background: #059669; color: white; }
  .cat-perf { background: #2563eb; color: white; }
  .cat-analysis { background: var(--orange); color: white; }
  .cat-interview { background: #dc2626; color: white; }
  .cat-draft { background: #d97706; color: white; }
  .cat-featured { background: var(--orange); color: white; }

  .side-news-title {
    font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700;
    color: white; line-height: 1.3; margin-bottom: 4px;
  }
  .side-news-desc { font-size: 11px; color: rgba(255,255,255,0.7); }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 16px; }

  .sidebar-card {
    background: white; border-radius: 14px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .sidebar-card-header {
    background: linear-gradient(135deg, var(--purple-deep), var(--purple-mid));
    padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-card-title {
    font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600;
    color: white; letter-spacing: 0.5px;
  }
  .sidebar-card-season { color: var(--orange); font-size: 11px; font-family: 'Oswald', sans-serif; font-weight: 600; }
  .sidebar-card-body { padding: 0; }

  /* STANDINGS TABLE */
  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table th {
    padding: 8px 14px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--gray-text); text-transform: uppercase; text-align: center;
    border-bottom: 1px solid var(--gray-border); background: #fafafa;
  }
  .standings-table th:first-child { text-align: left; }
  .standings-table td { padding: 9px 14px; font-size: 12px; border-bottom: 1px solid #f0f0f4; text-align: center; }
  .standings-table td:first-child { text-align: left; }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table tr:hover td { background: #f8f4ff; }
  .standings-table tr.top3 td { background: #fdf8ff; }

  .rank-num { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px; color: var(--gray-text); width: 16px; }
  .rank-num.gold { color: #f59e0b; }
  .rank-num.silver { color: #94a3b8; }
  .rank-num.bronze { color: #cd7c2f; }
  .team-cell { display: flex; align-items: center; gap: 8px; }
  .team-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .team-name-small { font-weight: 600; font-size: 12px; }
  .win { color: #059669; font-weight: 700; }
  .loss { color: #dc2626; font-weight: 700; }
  .pf { color: var(--purple-mid); font-weight: 600; font-size: 11px; }

  /* POWER RANKINGS */
  .power-list { padding: 8px 0; }
  .power-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 18px;
    border-bottom: 1px solid #f0f0f4; transition: background 0.15s; cursor: pointer;
  }
  .power-item:last-child { border-bottom: none; }
  .power-item:hover { background: #f8f4ff; }
  .power-rank { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; color: #e5e7eb; width: 24px; }
  .power-info { flex: 1; }
  .power-name { font-weight: 600; font-size: 13px; }
  .power-trend { font-size: 11px; margin-top: 1px; }
  .trend-up { color: #059669; }
  .trend-down { color: #dc2626; }
  .trend-same { color: #94a3b8; }
  .power-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: white; font-family: 'Oswald', sans-serif; }

  .sidebar-link-row {
    padding: 12px 18px; border-top: 1px solid #f0f0f4;
    display: flex; justify-content: flex-end;
  }
  .sidebar-link {
    color: var(--purple-light); font-size: 12px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 4px; text-decoration: none;
    font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; transition: color 0.2s;
  }
  .sidebar-link:hover { color: var(--orange); }

  /* NEWS FEED */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 28px 0 16px; padding-bottom: 12px;
    border-bottom: 2px solid var(--gray-border);
  }
  .section-title {
    font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; color: var(--purple-deep);
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::before {
    content: ''; width: 4px; height: 24px; background: var(--orange); border-radius: 2px;
  }
  .section-more { color: var(--purple-light); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; }
  .section-more:hover { color: var(--orange); }

  .news-feed { display: flex; flex-direction: column; gap: 0; }
  .feed-item {
    display: flex; gap: 16px; padding: 18px 0;
    border-bottom: 1px solid var(--gray-border); cursor: pointer;
    transition: transform 0.15s;
  }
  .feed-item:last-child { border-bottom: none; }
  .feed-item:hover { transform: translateX(4px); }
  .feed-thumb {
    width: 100px; height: 72px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; overflow: hidden;
  }
  .feed-content { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .feed-top { display: flex; flex-direction: column; gap: 4px; }
  .feed-title { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 600; color: var(--black); line-height: 1.3; }
  .feed-title:hover { color: var(--purple-mid); }
  .feed-desc { font-size: 12px; color: var(--gray-text); line-height: 1.5; }
  .feed-meta { display: flex; align-items: center; gap: 8px; }
  .feed-time { font-size: 11px; color: #aaa; }

  /* VIDEOS */
  .videos-card {
    background: white; border-radius: 14px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-top: 0;
  }
  .video-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 18px;
    border-bottom: 1px solid #f0f0f4; cursor: pointer; transition: background 0.15s;
  }
  .video-item:last-child { border-bottom: none; }
  .video-item:hover { background: #f8f4ff; }
  .video-thumb {
    width: 60px; height: 40px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    position: relative; flex-shrink: 0;
  }
  .play-icon {
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--purple-deep); padding-left: 2px;
  }
  .video-info { flex: 1; }
  .video-title { font-size: 12px; font-weight: 600; line-height: 1.3; }
  .video-dur { font-size: 10px; color: var(--gray-text); margin-top: 2px; }

  /* PAGE SECTIONS */
  .page-section { display: none; }
  .page-section.active { display: block; }

  .page-hero {
    background: linear-gradient(135deg, var(--purple-deep) 0%, #1a0635 100%);
    border-radius: 16px; padding: 40px; margin-bottom: 24px; color: white;
    position: relative; overflow: hidden;
  }
  .page-hero::after {
    content: ''; position: absolute; right: -60px; top: -60px;
    width: 300px; height: 300px; border-radius: 50%;
    border: 2px solid rgba(249,115,22,0.1);
  }
  .page-hero-title { font-family: 'Oswald', sans-serif; font-size: 36px; font-weight: 700; margin-bottom: 8px; }
  .page-hero-sub { color: rgba(255,255,255,0.6); font-size: 14px; }

  .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .team-card {
    background: white; border-radius: 14px; padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border-left: 4px solid var(--purple-mid); transition: transform 0.15s, box-shadow 0.15s;
  }
  .team-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
  .team-card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .team-card-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: white; font-family: 'Oswald', sans-serif; }
  .team-card-name { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; }
  .team-card-gm { font-size: 12px; color: var(--gray-text); }
  .team-stats { display: flex; gap: 16px; }
  .team-stat { text-align: center; }
  .team-stat-val { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; }
  .team-stat-label { font-size: 10px; color: var(--gray-text); font-weight: 600; letter-spacing: 1px; }
  .status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-top: 12px; }
  .status-contender { background: #d1fae5; color: #065f46; }

  const home = getTeam(m.home);

  return (
    <div className="matchup-card">
      <div className="matchup-time">
        <span className="matchup-when">{m.day} • {m.time}</span>
        {m.status === 'AO VIVO' ? <span className="badge-live">● AO VIVO</span> : <span className="badge-preview">{m.status}</span>}

      <div className="matchup-teams">
        <div className="team-mini">
          <TeamLogo team={m.home} size={60} />
          <div className="team-mini-name">{home.name}</div>
        </div>

function App() {
  const [page, setPage] = useState('HOME');

  const renderPage = () => {
    switch (page) {
      case 'TIMES': return <TeamsPage />;
      case 'REGRAS': return <RulesPage />;
      case 'CALENDÁRIO': return <CalendarPage />;
      case 'HALL DA FAMA': return <HallOfFamePage />;
      case 'TRADES': return <TradesPage />;
      case 'DRAFT': return <DraftPage />;
      default: return <HomePage />;
    }
  };

  return (
    <div>
      <TopBar activePage={page} setPage={setPage} />
      <Header />
      {renderPage()}
      <footer className="footer">
        <strong>AIRBALL DYNASTY LEAGUE</strong> • Since FEV 2025 • Temporada 2026/27 • Todos os direitos reservados
      </footer>
    </div>
  );
}
