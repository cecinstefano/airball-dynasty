<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Airball Dynasty League</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png?v=3">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon.png?v=3">
  <link rel="shortcut icon" href="/assets/favicon.png?v=3">
  <link rel="apple-touch-icon" href="/assets/favicon.png?v=3">


<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ultra&family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --purple-deep: #2D0A4E;
    --purple-mid: #4B1A7A;
    --purple-light: #6B2FA0;
    --orange: #F97316;
    --orange-dark: #EA6A08;
    --black: #0A0A0A;
    --white: #FFFFFF;
    --gray-bg: #F1F1F5;
    --gray-card: #FAFAFA;
    --gray-border: #E2E2E8;
    --gray-text: #6B6B7B;
    --gray-dark: #1A1A2E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--gray-bg);
    color: var(--black);
    min-height: 100vh;
  }

  h1, h2, h3, h4, h5, .oswald { font-family: 'Oswald', sans-serif; }

  /* TOP BAR */
  .topbar {
    background: var(--black);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 38px;
    border-bottom: 1px solid #1f1f2e;
  }
  .topbar-links { display: flex; gap: 0; }
  .topbar-link {
    color: #aaa;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 0 14px;
    height: 38px;
    display: flex;
    align-items: center;
    cursor: pointer;
    border: none;
    background: none;
    transition: color 0.2s, background 0.2s;
    font-family: 'Oswald', sans-serif;
    border-right: 1px solid #222;
  }
  .topbar-link:first-child { border-left: 1px solid #222; }
  .topbar-link:hover, .topbar-link.active { color: var(--orange); background: #111; }
  .topbar-right { color: #555; font-size: 11px; display: flex; align-items: center; gap: 8px; }
  .topbar-season { color: var(--orange); font-weight: 700; font-family: 'Oswald', sans-serif; letter-spacing: 1px; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--purple-deep) 0%, #1a0635 40%, var(--purple-deep) 100%);
    padding: 0 24px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    border-bottom: 2px solid var(--orange);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .menu-btn {
    display: flex; flex-direction: column; gap: 4px;
    cursor: pointer; padding: 6px; border: none; background: none;
  }
  .menu-btn span {
    display: block; width: 22px; height: 2px;
    background: white; border-radius: 2px; transition: 0.2s;
  }
  .menu-label { color: #aaa; font-size: 10px; letter-spacing: 2px; font-weight: 600; font-family: 'Oswald', sans-serif; }

  .logo-area { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--orange) 0%, var(--orange-dark) 50%, #c45a00 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 12px rgba(249,115,22,0.4);
    overflow: hidden;
  }
  .logo-img { width: 100%; height: 100%; object-fit: cover; }
  .logo-text { line-height: 1; }
  .logo-top { font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 400; color: #aaa; letter-spacing: 3px; text-transform: uppercase; }
  .logo-main { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: var(--orange); letter-spacing: 1px; line-height: 1; }
  .logo-sub { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 500; color: #c084fc; letter-spacing: 4px; text-transform: uppercase; }

  .header-brand-text {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    white-space: nowrap;
    text-align: center;
    line-height: 0.92;
  }
  .brand-airball {
    display: block;
    font-family: 'Ultra', 'Rockwell Extra Bold', 'Georgia', serif;
    font-size: 38px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #F97316;
    -webkit-text-fill-color: #F97316;
    -webkit-text-stroke: 0;
    paint-order: stroke fill;
    text-shadow:
      2px 0 0 #ffffff,
      -2px 0 0 #ffffff,
      0 2px 0 #ffffff,
      0 -2px 0 #ffffff,
      2px 2px 0 #ffffff,
      -2px 2px 0 #ffffff,
      2px -2px 0 #ffffff,
      -2px -2px 0 #ffffff,
      4px 5px 0 rgba(0,0,0,0.72),
      0 0 18px rgba(249,115,22,0.55);
  }
  .brand-dynasty {
    display: block;
    margin-top: 6px;
    font-family: 'Ultra', 'Rockwell Extra Bold', 'Georgia', serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #7C3AED;
    -webkit-text-fill-color: #7C3AED;
    -webkit-text-stroke: 0;
    paint-order: stroke fill;
    text-shadow:
      1.5px 0 0 #ffffff,
      -1.5px 0 0 #ffffff,
      0 1.5px 0 #ffffff,
      0 -1.5px 0 #ffffff,
      1.5px 1.5px 0 #ffffff,
      -1.5px 1.5px 0 #ffffff,
      1.5px -1.5px 0 #ffffff,
      -1.5px -1.5px 0 #ffffff,
      3px 4px 0 rgba(0,0,0,0.75),
      0 0 14px rgba(124,58,237,0.6);
  }

  .header-right { display: none; }
  .champion-pennant {
    position: absolute;
    right: 24px;
    top: -4px;
    width: 78px;
    height: 108px;
    z-index: 6;
    pointer-events: none;
    filter: drop-shadow(0 10px 16px rgba(0,0,0,0.24));
  }
  .champion-pennant-rod {
    position: absolute;
    top: 0;
    left: 5px;
    right: 5px;
    height: 4px;
    border-radius: 999px;
    background: linear-gradient(180deg, #f6dc74 0%, #d4a72c 100%);
    box-shadow: 0 1px 0 rgba(255,255,255,0.45) inset;
  }
  .champion-pennant-rod::before,
  .champion-pennant-rod::after {
    content: '';
    position: absolute;
    top: -1px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: linear-gradient(180deg, #f9df7a 0%, #c89215 100%);
  }
  .champion-pennant-rod::before { left: -1px; }
  .champion-pennant-rod::after { right: -1px; }
  .champion-pennant-body {
    position: absolute;
    top: 4px;
    left: 6px;
    right: 6px;
    bottom: 0;
    background: linear-gradient(180deg, #f2cc55 0%, #dba11a 100%);
    clip-path: polygon(0 0, 100% 0, 100% 76%, 50% 100%, 0 76%);
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .champion-pennant-body::before {
    content: '';
    position: absolute;
    inset: 2px;
    background: radial-gradient(circle at 50% 18%, rgba(255,255,255,0.14), transparent 28%), linear-gradient(180deg, #0d6b35 0%, #014f29 58%, #08381f 100%);
    clip-path: polygon(0 0, 100% 0, 100% 76%, 50% 100%, 0 76%);
    box-shadow: inset 0 0 0 1px rgba(255,242,184,0.28), inset 0 -10px 18px rgba(0,0,0,0.18);
  }
  .champion-pennant-content {
    position: relative;
    z-index: 1;
    padding: 9px 5px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .champion-pennant-kicker {
    font-family: 'Oswald', sans-serif;
    font-size: 6px;
    line-height: 1;
    letter-spacing: 1px;
    color: #fff2b8;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .champion-pennant-team {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    line-height: 0.94;
    font-weight: 700;
    color: #ffd84c;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.35);
  }
  .champion-pennant-mark {
    margin: 4px 0 4px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.42);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.18);
    overflow: hidden;
  }
  .champion-pennant-mark img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .champion-pennant-champ {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    line-height: 0.95;
    font-weight: 700;
    color: #ffd84c;
    text-transform: uppercase;
    letter-spacing: 0.2px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.35);
  }
  .champion-pennant-trophy {
    margin-top: 1px;
    font-size: 12px;
    line-height: 1;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25));
  }
  .search-box {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; padding: 8px 14px; gap: 8px;
    transition: border 0.2s;
  }
  .search-box:focus-within { border-color: var(--orange); }
  .search-box input {
    background: none; border: none; outline: none;
    color: white; font-size: 13px; width: 220px;
  }
  .search-box input::placeholder { color: rgba(255,255,255,0.35); }
  .user-area { display: flex; align-items: center; gap: 8px; }
  .user-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-light), var(--orange));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: white; font-family: 'Oswald', sans-serif;
    border: 2px solid var(--orange);
  }
  .user-name { color: white; font-size: 13px; font-weight: 500; }
  .user-greeting { color: #aaa; font-size: 11px; }

  /* MATCHUPS STRIP */
  .matchups-strip {
    background: var(--gray-dark);
    padding: 0;
    border-bottom: 1px solid #2a2a3e;
    display: flex;
    align-items: stretch;
    overflow: hidden;
  }
  .matchups-marquee {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .matchups-track {
    display: flex;
    gap: 0;
    width: max-content;
    animation: matchupMarquee 58s linear infinite;
    will-change: transform;
  }
  .matchups-track:hover { animation-play-state: paused; }
  @keyframes matchupMarquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .matchups-marquee::before, .matchups-marquee::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 36px;
    z-index: 3;
    pointer-events: none;
  }
  .matchups-marquee::before {
    left: 0;
    background: linear-gradient(to right, var(--gray-dark), rgba(26,26,46,0));
  }
  .matchups-marquee::after {
    right: 0;
    background: linear-gradient(to left, var(--gray-dark), rgba(26,26,46,0));
  }

  .week-card {
    min-width: 130px; padding: 14px 16px;
    border-right: 1px solid #2a2a3e;
    display: flex; flex-direction: column; justify-content: center; gap: 8px;
    flex-shrink: 0;
    position: relative;
    z-index: 4;
  }
  .week-label { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; color: var(--orange); }
  .week-btn {
    background: var(--orange); color: white; border: none;
    font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 1px; padding: 5px 10px; border-radius: 4px; cursor: pointer;
    transition: background 0.2s;
  }
  .week-btn:hover { background: var(--orange-dark); }

  .matchup-card {
    min-width: 360px; padding: 14px 20px;
    border-right: 1px solid #2a2a3e; cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s;
    display: flex; flex-direction: column; gap: 6px;
  }
  .matchup-card:hover { background: rgba(249,115,22,0.05); }

  .matchup-time {
    display: flex; align-items: center; justify-content: space-between;
  }
  .matchup-when { color: #888; font-size: 10px; font-weight: 600; letter-spacing: 1px; font-family: 'Oswald', sans-serif; }
  .badge-preview { background: #2a2a3e; color: #aaa; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; letter-spacing: 1px; }
  .badge-live { background: #ef4444; color: white; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; letter-spacing: 1px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .matchup-teams {
    display: flex; align-items: center; justify-content: space-between; gap: 18px;
  }
  .team-mini { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; min-width: 96px; }
  .team-mini-icon {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: white; font-family: 'Oswald', sans-serif;
  }
  .team-mini-name { font-size: 10px; color: #cfd0dc; text-align: center; font-weight: 600; max-width: 96px; line-height: 1.15; }
  .vs-score { text-align: center; min-width: 74px; flex-shrink: 0; }
  .score-display { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: white; white-space: nowrap; letter-spacing: 0.5px; }
  .score-period { font-size: 10px; color: var(--orange); font-weight: 700; }

  /* MAIN CONTENT */
  .main-wrap { max-width: 1280px; margin: 0 auto; padding: 24px 16px; }

  .content-grid {
    display: grid; grid-template-columns: 1fr 320px;
    gap: 24px;
  }

  /* NEWS AREA */
  .news-grid {
    display: grid; grid-template-rows: auto 1fr;
    grid-template-columns: minmax(0, 1.28fr) minmax(0, 0.92fr);
    gap: 16px;
  }
  .featured-card {
    grid-row: 1 / 3; grid-column: 1 / 2;
    border-radius: 16px; overflow: hidden; position: relative;
    min-height: 450px; cursor: pointer;
    background: linear-gradient(135deg, var(--purple-deep) 0%, #0f0520 100%);
  }
  .featured-bg {
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse at 70% 30%, rgba(249,115,22,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(107,47,160,0.3) 0%, transparent 50%),
      linear-gradient(135deg, #1a0635 0%, #0a0015 100%);
  }
  .court-lines {
    position: absolute; inset: 0; opacity: 0.06;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.5) 40px, rgba(255,255,255,0.5) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.3) 80px, rgba(255,255,255,0.3) 81px);
  }
  .ball-deco {
    position: absolute; right: -40px; top: -40px;
    width: 220px; height: 220px; border-radius: 50%;
    border: 3px solid rgba(249,115,22,0.2);
    box-shadow: inset 0 0 60px rgba(249,115,22,0.1);
  }
  .ball-deco::after {
    content: ''; position: absolute; inset: 20px; border-radius: 50%;
    border: 2px solid rgba(249,115,22,0.15);
  }
  .featured-content {
    position: relative; z-index: 2; height: 100%;
    display: flex; flex-direction: column; justify-content: flex-end; padding: 28px;
  }
  .featured-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--orange); color: white;
    font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px;
    padding: 4px 12px; border-radius: 4px; width: fit-content; margin-bottom: 12px;
  }
  .featured-title {
    font-family: 'Oswald', sans-serif; font-size: 28px; font-weight: 700;
    color: white; line-height: 1.2; margin-bottom: 16px;
  }
  .featured-bullets { display: flex; flex-direction: column; gap: 6px; }
  .featured-bullet {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: rgba(255,255,255,0.75);
  }
  .featured-bullet::before {
    content: ''; width: 4px; height: 4px; border-radius: 50%;
    background: var(--orange); flex-shrink: 0;
  }
  .featured-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1);
  }
  .featured-mvp { display: flex; align-items: center; gap: 8px; }
  .mvp-icon { font-size: 18px; }
  .mvp-label { color: rgba(255,255,255,0.5); font-size: 11px; }
  .mvp-name { color: var(--orange); font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 14px; }
  .featured-time { color: rgba(255,255,255,0.4); font-size: 11px; }

  .side-news {
    border-radius: 12px; overflow: hidden; position: relative;
    min-height: 190px; cursor: pointer;
  }
  .side-news-bg {
    position: absolute; inset: 0;
  }
  .side-news-content {
    position: relative; z-index: 2; padding: 20px;
    height: 100%; display: flex; flex-direction: column; justify-content: flex-end;
  }
  .news-cat {
    font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px;
    padding: 3px 8px; border-radius: 3px; display: inline-block; width: fit-content; margin-bottom: 8px;
  }
  .cat-rules { background: #7c3aed; color: white; }
  .cat-market { background: #059669; color: white; }
  .cat-perf { background: #2563eb; color: white; }
  .cat-analysis { background: var(--orange); color: white; }
  .cat-interview { background: #dc2626; color: white; }
  .cat-draft { background: #d97706; color: white; }
  .cat-featured { background: var(--orange); color: white; }

  .side-news-title {
    font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700;
    color: white; line-height: 1.3; margin-bottom: 4px;
  }
  .side-news-desc { font-size: 11px; color: rgba(255,255,255,0.7); }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 16px; }

  .sidebar-card {
    background: white; border-radius: 14px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .sidebar-card-header {
    background: linear-gradient(135deg, var(--purple-deep), var(--purple-mid));
    padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-card-title {
    font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600;
    color: white; letter-spacing: 0.5px;
  }
  .sidebar-card-season { color: var(--orange); font-size: 11px; font-family: 'Oswald', sans-serif; font-weight: 600; }
  .sidebar-card-body { padding: 0; }

  /* STANDINGS TABLE */
  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table th {
    padding: 8px 14px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--gray-text); text-transform: uppercase; text-align: center;
    border-bottom: 1px solid var(--gray-border); background: #fafafa;
  }
  .standings-table th:first-child { text-align: left; }
  .standings-table td { padding: 9px 14px; font-size: 12px; border-bottom: 1px solid #f0f0f4; text-align: center; }
  .standings-table td:first-child { text-align: left; }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table tr:hover td { background: #f8f4ff; }
  .standings-table tr.top3 td { background: #fdf8ff; }

  .rank-num { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px; color: var(--gray-text); width: 16px; }
  .rank-num.gold { color: #f59e0b; }
  .rank-num.silver { color: #94a3b8; }
  .rank-num.bronze { color: #cd7c2f; }
  .team-cell { display: flex; align-items: center; gap: 8px; }
  .team-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .team-name-small { font-weight: 600; font-size: 12px; }
  .win { color: #059669; font-weight: 700; }
  .loss { color: #dc2626; font-weight: 700; }
  .pf { color: var(--purple-mid); font-weight: 600; font-size: 11px; }

  /* POWER RANKINGS */
  .power-list { padding: 8px 0; }
  .power-item {

function normalizeTeamKey(value) {
  return String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[’']/g, ' ')
    .replace(/[^a-zA-Z0-9]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();
}

function normalizeTeamName(name) {
  const raw = String(name || '').trim();
  if (!raw) return '';
  if (TEAM_ALIASES[raw]) return TEAM_ALIASES[raw];
  const key = normalizeTeamKey(raw);
  if (TEAM_ALIASES[key]) return TEAM_ALIASES[key];
  const direct = TEAMS_MASTER.find(t => normalizeTeamKey(t.name) === key || normalizeTeamKey(t.slug) === key);
  if (direct) return direct.name;
  return raw;
}

function getTeam(name) {
  const raw = String(name || '').trim();
  const normalized = normalizeTeamName(raw);
  const key = normalizeTeamKey(normalized);
  const found = TEAMS_MASTER.find(t => normalizeTeamKey(t.name) === key || normalizeTeamKey(t.slug) === key);
  if (found) return found;
  return {
    name: normalized || raw || 'Time',
    gm: "",
    init: (normalized || raw || 'T').slice(0, 3).toUpperCase(),
    color: "#6B2FA0",
    logo: "./assets/logos/default-team.png"
  };
}

function TeamLogo({ team, size = 32 }) {
  const t = getTeam(team);
  const logoKey = `${t.name}-${t.logo}`;
  const [failedLogo, setFailedLogo] = useState('');
  const showFallback = failedLogo === logoKey;

  return (
    <span className={`team-logo-wrap ${showFallback ? 'team-logo-fallback' : ''}`} style={{width:size, height:size, background:t.color}} title={t.name}>
      {showFallback ? (
        <span>{t.init}</span>
      ) : (
        <img key={logoKey} src={t.logo} alt={t.name} className="team-logo-img" onError={() => setFailedLogo(logoKey)} />
      )}
    </span>
  );
}

function getPlayerInitials(name) {
  const parts = String(name || 'Jogador').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return 'FA';
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return `${parts[0][0] || ''}${parts[parts.length - 1][0] || ''}`.toUpperCase();
}

function PlayerPhoto({ player, size = 38 }) {
  const [failedPhoto, setFailedPhoto] = useState(false);
  const name = player?.name || 'Jogador';
  const photoUrl = player?.photoUrl || player?.playerPhoto || player?.headshotUrl || player?.headshot || player?.photo || player?.image || '';
  const showFallback = failedPhoto || !photoUrl;
  return (
    <span className={`trade-player-photo ${showFallback ? 'trade-player-photo-fallback' : ''}`} style={{width:size, height:size}} title={name}>
      {showFallback ? <span>{getPlayerInitials(name)}</span> : <img src={photoUrl} alt={name} crossOrigin="anonymous" referrerPolicy="no-referrer" onError={() => setFailedPhoto(true)} />}
    </span>
  );
}

function TopBar({ activePage, setPage }) {
  const links = ['INÍCIO', 'DRAFT', 'SORTEIO DRAFT', 'FRANQUIAS', 'REGRAS', 'HONESTÔMETRO', 'CALENDÁRIO', 'HALL DA FAMA', 'TRADES'];
  const pageForLink = (l) => l === 'INÍCIO' ? 'HOME' : l === 'FRANQUIAS' ? 'TIMES' : l;
  return (
    <div className="topbar">
      <div className="topbar-links">
        {links.map(l => {
          const targetPage = pageForLink(l);
          const isActive = activePage === targetPage;
          return (
            <button key={l} className={`topbar-link ${isActive ? 'active' : ''}`} onClick={() => setPage(targetPage === activePage ? 'HOME' : targetPage)}>
              {l}
            </button>
          );
        })}
      </div>
      <div className="topbar-right">
        <span className="topbar-season">TEMPORADA 2026/27</span>
        <span>•</span>
        <span>SEMANA 1</span>
      </div>
    </div>
  );
}

function MatchupCard({ m }) {
  const home = getTeam(m.home);

  return (
    <div className="matchup-card">
      <div className="matchup-time">
        <span className="matchup-when">{m.dateRange || `${m.day} • ${m.time}`}</span>
        {m.status === 'AO VIVO' ? <span className="badge-live">● AO VIVO</span> : <span className="badge-preview">{m.status || m.period}</span>}

      <div className="matchup-teams">

  );

function formatFinalPosition(rank) {
  if (!rank) return 'A definir';
  if (rank === 1) return '1º lugar';
  if (rank === 2) return '2º lugar';
  if (rank === 3) return '3º lugar';
  return `${rank}º lugar`;
}

function getFinalStandingForTeam(teamName) {
  const normalized = normalizeTeamName(teamName);
  return FINAL_STANDINGS_2526.find(row => normalizeTeamName(row.team) === normalized);
}

function HomeDraftCountdown() {
  const targetDate = new Date('2026-10-10T00:00:00-03:00');

  const getTimeLeft = () => {
    const diff = targetDate.getTime() - new Date().getTime();
    const total = Math.max(diff, 0);
    const days = Math.floor(total / (1000 * 60 * 60 * 24));
    const hours = Math.floor((total / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((total / (1000 * 60)) % 60);
    const seconds = Math.floor((total / 1000) % 60);
    return { days, hours, minutes, seconds };
  };

  const [timeLeft, setTimeLeft] = useState(getTimeLeft());

  useEffect(() => {
    const timer = setInterval(() => setTimeLeft(getTimeLeft()), 1000);
    return () => clearInterval(timer);
  }, []);

  const pad = (n) => String(n).padStart(2, '0');

  return (
    <div className="home-draft-countdown">
      <div className="home-draft-countdown-header">
        <div className="home-draft-countdown-title">⏳ Draft AirBall</div>
        <div className="home-draft-countdown-date">10 OUT 2026</div>
      </div>
      <div className="home-draft-countdown-grid">
        <div className="home-draft-countdown-box">
          <div className="home-draft-countdown-number">{timeLeft.days}</div>
          <div className="home-draft-countdown-label">Dias</div>
        </div>
        <div className="home-draft-countdown-box">
          <div className="home-draft-countdown-number">{pad(timeLeft.hours)}</div>
          <div className="home-draft-countdown-label">Horas</div>
        </div>
        <div className="home-draft-countdown-box">
          <div className="home-draft-countdown-number">{pad(timeLeft.minutes)}</div>
          <div className="home-draft-countdown-label">Min</div>
        </div>
        <div className="home-draft-countdown-box">
          <div className="home-draft-countdown-number">{pad(timeLeft.seconds)}</div>
          <div className="home-draft-countdown-label">Seg</div>
        </div>
      </div>
    </div>
  );
}

    { id: 'demo-5', name: 'Payton Pritchard', team: 'BOS', position: 'G', fantasyTeam: 'Demo', fantasyPoints: 29.4, totalPoints: 2100, status: 'DEMO' },
    { id: 'demo-6', name: 'Austin Reaves', team: 'LAL', position: 'G', fantasyTeam: 'Demo', fantasyPoints: 36.4, totalPoints: 2600, status: 'DEMO' },
    { id: 'demo-7', name: 'Deni Avdija', team: 'POR', position: 'F', fantasyTeam: 'Demo', fantasyPoints: 35.7, totalPoints: 2500, status: 'DEMO' },
    { id: 'demo-8', name: 'Chet Holmgren', team: 'OKC', position: 'PF/C', fantasyTeam: 'Demo', fantasyPoints: 41.8, totalPoints: 3000, status: 'DEMO' },
    { id: 'demo-9', name: 'Devin Booker', team: 'PHX', position: 'G', fantasyTeam: 'Demo', fantasyPoints: 44.1, totalPoints: 3150, status: 'DEMO' },
    { id: 'demo-10', name: 'Karl-Anthony Towns', team: 'NYK', position: 'PF/C', fantasyTeam: 'Demo', fantasyPoints: 43.5, totalPoints: 3100, status: 'DEMO' },
    { id: 'demo-11', name: 'Free Agent / Slot Livre', team: 'FA', position: '—', fantasyTeam: 'Livre', fantasyPoints: 20, totalPoints: 0, status: 'PISO' }
  ];

  const normalizeText = (value) => String(value || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();

  const cleanLeaguePosition = (position) => {
    const allowed = ['PG', 'SG', 'SF', 'PF', 'C'];
    const raw = String(position || '')
      .toUpperCase()
      .replace(/[^A-Z/ ,.-]/g, ' ')
      .split(/[\/\s,.-]+/)
      .filter(Boolean);
    const filtered = raw.filter(pos => allowed.includes(pos));
    return [...new Set(filtered)].join('/') || '—';
  };

  const normalizePlayer = (p, index) => {
    const nested = p.player || {};
    const name = p.name || p.fullName || p.playerName || p.displayName || nested.fullName || 'Jogador sem nome';
    const rawAvg = p.fantasyPoints ?? p.avgFantasyPoints ?? p.averageFantasyPoints ?? p.avg ?? p.appliedAverage ?? p.value ?? nested.appliedAverage ?? 0;
    const rawTotal = p.totalPoints ?? p.totalFantasyPoints ?? p.total ?? p.appliedTotal ?? nested.appliedTotal ?? 0;
    const fantasyPoints = Number(rawAvg) || 0;
    const totalPoints = Number(rawTotal) || 0;
    const position = cleanLeaguePosition(p.position || p.defaultPosition || p.eligibleSlotsText || (Array.isArray(p.positions) ? p.positions.join('/') : '') || '—');
    const team = p.team || p.proTeam || p.proTeamAbbrev || p.nbaTeam || p.proTeamId || 'NBA';
    const fantasyTeam = p.fantasyTeam || p.owner || p.fantasyOwner || '—';
    const status = p.status || p.injuryStatus || nested.injuryStatus || 'OK';
    const id = String(p.id || p.playerId || p.espnId || nested.id || `${name}-${index}`);
    const workerOrigin = (() => { try { return HONESTOMETRO_CONFIG.playersApiUrl ? new URL(HONESTOMETRO_CONFIG.playersApiUrl).origin : ''; } catch (e) { return ''; } })();
    const workerPhotoUrl = workerOrigin && /^\d+$/.test(id) ? `${workerOrigin}/player-photo/${id}` : '';
    const directHeadshot = nested.headshot?.href || nested.headshot?.url || p.headshotUrl || p.headshot?.href || p.headshot?.url || p.playerPhoto || p.photoUrl || p.photo || p.image || '';
    const photoUrl = workerPhotoUrl || directHeadshot;
    return {
      id,
      name,
      fantasyPoints: Number(fantasyPoints.toFixed ? fantasyPoints.toFixed(1) : fantasyPoints),
      totalPoints: Number(totalPoints.toFixed ? totalPoints.toFixed(1) : totalPoints),
      position,
      team,
      fantasyTeam,
      status,
      photoUrl
    };
  };

  const [players, setPlayers] = useState(DEMO_PLAYERS);
  const [dataStatus, setDataStatus] = useState(HONESTOMETRO_CONFIG.playersApiUrl ? 'Carregando jogadores da ESPN...' : 'Modo demonstração — configure o Worker para dados reais');
  const [dataLive, setDataLive] = useState(false);
  const [teamA, setTeamA] = useState('Time A');
  const [teamB, setTeamB] = useState('Time B');
  const [sideA, setSideA] = useState([]);
  const [sideB, setSideB] = useState([]);
  const [queryA, setQueryA] = useState('');
  const [queryB, setQueryB] = useState('');
  const [manualA, setManualA] = useState('');
  const [manualB, setManualB] = useState('');
  const [selectedA, setSelectedA] = useState(null);
  const [selectedB, setSelectedB] = useState(null);
  const [copied, setCopied] = useState(false);
  const [printing, setPrinting] = useState(false);
  const resultCardRef = useRef(null);

  useEffect(() => {
    if (!HONESTOMETRO_CONFIG.playersApiUrl) return;
    fetch(HONESTOMETRO_CONFIG.playersApiUrl)
      .then(res => {
        if (!res.ok) throw new Error('Erro HTTP ' + res.status);
        return res.json();
      })
      .then(data => {
        const list = Array.isArray(data) ? data : (data.players || data.items || []);
        const normalized = list.map(normalizePlayer).filter(p => p.name && Number(p.fantasyPoints) > 0);
        if (normalized.length) {
          setPlayers(normalized);
          setDataLive(true);
          setDataStatus(`${normalized.length} jogadores ESPN carregados`);
        } else {
          setDataStatus('API conectada, mas sem jogadores válidos');
        }
      })
      .catch(() => {
        setDataLive(false);
        setDataStatus('Erro na API — usando demonstração');
      });
  }, []);

  const getMultiplier = (avg) => MULTIPLIERS.find(row => avg <= row.max) || MULTIPLIERS[MULTIPLIERS.length - 1];

  const calcPlayer = (player) => {
    const rawAvg = Number(player.fantasyPoints) || 0;
    const effectiveAvg = Math.max(rawAvg, FLOOR_AVG);
    const row = getMultiplier(effectiveAvg);
    const value = Number((effectiveAvg * row.mult).toFixed(1));
    return { rawAvg: Number(rawAvg.toFixed ? rawAvg.toFixed(1) : rawAvg), effectiveAvg: Number(effectiveAvg.toFixed(1)), multiplier: row.mult, multiplierLabel: `${row.mult.toFixed(2)}x`, value };
  };

  const sumPlayers = (side) => Number(side.reduce((acc, p) => acc + calcPlayer(p).value, 0).toFixed(1));
  const slotCompFor = (side, otherSide) => Math.max(0, otherSide.length - side.length) * SLOT_COMPENSATION;
  const sideTotal = (side, otherSide) => Number((sumPlayers(side) + slotCompFor(side, otherSide)).toFixed(1));

  const playerSubtotalA = sumPlayers(sideA);
  const playerSubtotalB = sumPlayers(sideB);
  const slotCompA = slotCompFor(sideA, sideB);
  const slotCompB = slotCompFor(sideB, sideA);
  const totalA = sideTotal(sideA, sideB);
  const totalB = sideTotal(sideB, sideA);
  const high = Math.max(totalA, totalB);
  const low = Math.min(totalA, totalB);
  const diffPct = high > 0 ? Number((((high - low) / high) * 100).toFixed(1)) : 0;
  const largerPackage = totalA === totalB ? 'Empate' : totalA > totalB ? teamA : teamB;
  const isOneForOne = sideA.length === 1 && sideB.length === 1;
  const oneForOneAvgDiff = isOneForOne ? Number(Math.abs((Number(sideA[0]?.fantasyPoints) || 0) - (Number(sideB[0]?.fantasyPoints) || 0)).toFixed(1)) : null;
  const oneForOneException = isOneForOne && oneForOneAvgDiff < 3;

  const verdict = (() => {
    if (!totalA || !totalB) return { label: 'Monte a troca', note: 'Adicione jogadores dos dois lados para liberar o parecer.', cls: 'neutral', status: 'Aguardando jogadores' };
    if (oneForOneException) return { label: 'Aprovada', note: `Regra especial 1x1 aplicada: a diferença de AVG entre os jogadores é de ${oneForOneAvgDiff} fantasy points, abaixo de 3. A troca é aceita mesmo se passar da margem percentual.`, cls: 'good', status: 'Trade aprovada pela regra 1x1' };
    if (diffPct < APPROVAL_LIMIT) return { label: 'Aprovada', note: 'Diferença abaixo de 10%. Pode exportar/postar e iniciar a janela de 12h para atravessamento.', cls: 'good', status: 'Trade aprovada pelo cálculo' };
    return { label: 'Reprovada', note: `Diferença de ${diffPct}% entre os pacotes. O maior pacote é de ${largerPackage}. Ajuste a troca até ficar abaixo de 10%, exceto em trocas 1x1 com diferença de AVG menor que 3 fantasy points.`, cls: 'bad', status: 'Trade fora da margem' };
  })();

  const suggest = (query, side) => {
    const q = normalizeText(query.trim());
    if (!q) return [];
    const used = new Set([...sideA, ...sideB].map(p => p.id));
    return players
      .filter(p => !used.has(p.id) || side.some(item => item.id === p.id))
      .map(p => ({ ...p, searchName: normalizeText(p.name), searchTeam: normalizeText(p.team), searchPos: normalizeText(p.position) }))
      .filter(p => p.searchName.includes(q) || p.searchTeam.includes(q) || p.searchPos.includes(q))
      .sort((a, b) => {
        const aStarts = a.searchName.startsWith(q) ? 0 : 1;
        const bStarts = b.searchName.startsWith(q) ? 0 : 1;
        if (aStarts !== bStarts) return aStarts - bStarts;
        return (Number(b.fantasyPoints) || 0) - (Number(a.fantasyPoints) || 0);
      })
      .slice(0, 8);
  };

  const suggestionsA = suggest(queryA, sideA);
  const suggestionsB = suggest(queryB, sideB);

  const isValidFantasyTeam = (name) => {
    const clean = String(name || '').trim();
    const blocked = ['—', '-', 'Livre', 'Free Agent', 'Manual/FA', 'Demo', 'PISO', 'OK'];
    return clean && !blocked.some(item => normalizeText(item) === normalizeText(clean));
  };

  const getOwnerName = (player) => {
    const owner = String(player?.fantasyTeam || '').trim();
    return isValidFantasyTeam(owner) ? owner : '';
  };

  const setSideOwnerName = (sideName, player, currentSideLength = 0) => {
    const owner = getOwnerName(player);
    if (!owner || currentSideLength > 0) return;
    const canonicalOwner = getTeam(owner).name;
    if (sideName === 'A') setTeamA(canonicalOwner);
    if (sideName === 'B') setTeamB(canonicalOwner);
  };

  const syncTeamNameAfterRemove = (sideName, nextSide) => {
    if (sideName === 'A') {
      if (!nextSide.length) { setTeamA('Time A'); return; }
      const owner = getOwnerName(nextSide[0]);
      if (owner) setTeamA(getTeam(owner).name);
    }
    if (sideName === 'B') {
      if (!nextSide.length) { setTeamB('Time B'); return; }
      const owner = getOwnerName(nextSide[0]);
      if (owner) setTeamB(getTeam(owner).name);
    }
  };

  const addPlayer = (sideName) => {
    const isA = sideName === 'A';
    const selected = isA ? selectedA : selectedB;
    const query = isA ? queryA : queryB;
    if (!selected && !query.trim()) return;
    const player = selected || { id: `manual-${Date.now()}-${Math.random()}`, name: query.trim(), fantasyPoints: FLOOR_AVG, totalPoints: 0, team: 'Manual/FA', position: '—', fantasyTeam: 'Livre', status: 'PISO' };
    const avgToUse = Number(player.fantasyPoints) || FLOOR_AVG;
    const totalToUse = Number(player.totalPoints) || 0;
    const playerWithValue = { ...player, fantasyPoints: Number(avgToUse.toFixed(1)), totalPoints: Number(totalToUse.toFixed(1)) };
    if (isA) {
      setSideOwnerName('A', playerWithValue, sideA.length);
      setSideA([...sideA, playerWithValue]);
      setQueryA('');
      setManualA('');
      setSelectedA(null);
    } else {
      setSideOwnerName('B', playerWithValue, sideB.length);
      setSideB([...sideB, playerWithValue]);
      setQueryB('');
      setManualB('');
      setSelectedB(null);
    }
  };

  const removePlayer = (sideName, id) => {
    if (sideName === 'A') {
      const nextSide = sideA.filter(p => p.id !== id);
      setSideA(nextSide);
      syncTeamNameAfterRemove('A', nextSide);
    }
    if (sideName === 'B') {
      const nextSide = sideB.filter(p => p.id !== id);
      setSideB(nextSide);
      syncTeamNameAfterRemove('B', nextSide);
    }
  };

  const pickSuggestion = (sideName, player) => {
    if (sideName === 'A') { setSelectedA(player); setQueryA(player.name); setManualA(''); }
    else { setSelectedB(player); setQueryB(player.name); setManualB(''); }
  };

  const formatNumber = (value) => {
    const n = Number(value) || 0;
    return n.toLocaleString('pt-BR', { maximumFractionDigits: 1 });
  };

  const safeFileName = (value) => String(value || '')
    .normalize('NFD')
    .replace(/[̀-ͯ]/g, '')
    .replace(/[^a-zA-Z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .toLowerCase() || 'trade';

  const renderResultSide = ({ teamName, side, otherSide, subtotal, comp, total }) => (
    <div className="trade-result-team-card">
      <div className="trade-result-team-head">
        <TeamLogo team={teamName} size={44} />
        <div>
          <div className="trade-result-team-name">{teamName}</div>
          <div className="trade-result-team-action">envia</div>
        </div>
      </div>
      {side.length === 0 ? (
        <div className="trade-result-empty-mini">Nenhum jogador selecionado.</div>
      ) : (
        <div className="trade-result-player-list">
          {side.map(p => {
            const c = calcPlayer(p);
            return (
              <div className="trade-result-player-mini" key={`result-${p.id}`}>
                <div className="trade-result-player-mini-main"><PlayerPhoto player={p} size={42} /><div className="trade-result-player-mini-text"><div className="trade-result-player-mini-name">{p.name}</div>
                <div className="trade-result-player-mini-stats">
                  <span>AVG <strong>{c.rawAvg.toFixed(1)}</strong></span>
                  <span>TOTAL <strong>{formatNumber(p.totalPoints)}</strong></span>
                  <span>VALOR <strong>{c.value}</strong></span>
                </div></div></div>
              </div>
            );
          })}
        </div>
      )}
      <div className="trade-result-side-total">
        <div><span>Total do pacote</span><small>Jogadores {subtotal} {comp ? `+ slots ${comp}` : ''}</small></div>
        <strong>{total}</strong>
      </div>
    </div>
  );

  const exportText = () => {
    const list = (side) => side.length ? side.map(p => {
      const c = calcPlayer(p);
      const floorNote = c.rawAvg < FLOOR_AVG ? ` | piso ${FLOOR_AVG}` : '';
      const totalInfo = p.totalPoints ? ` | TOTAL ${formatNumber(p.totalPoints)}` : '';
      return `• ${p.name} — AVG ${c.rawAvg}${totalInfo}${floorNote} × ${c.multiplierLabel} = ${c.value}`;
    }).join('\n') : '• Nenhum jogador';
    return `⚖️ HONESTÔMETRO AIRBALL\n\nRegras: piso ${FLOOR_AVG} pts, multiplicadores por AVG, compensação de ${SLOT_COMPENSATION} pts por slot de diferença, aprovação se diferença < ${APPROVAL_LIMIT}% e regra especial 1x1: se a diferença de AVG for menor que 3 fantasy points, a troca é aceita.\n\n${teamA} envia:\n${list(sideA)}\nSubtotal jogadores: ${playerSubtotalA}\nCompensação de slot: +${slotCompA}\nTotal: ${totalA}\n\n${teamB} envia:\n${list(sideB)}\nSubtotal jogadores: ${playerSubtotalB}\nCompensação de slot: +${slotCompB}\nTotal: ${totalB}\n\nDiferença: ${diffPct}%${oneForOneAvgDiff !== null ? `\nDiferença de AVG 1x1: ${oneForOneAvgDiff}` : ''}\nResultado: ${verdict.label}\nParecer: ${verdict.note}\n\nApós postagem, começa a janela de 12 horas para atravessamento.`;
  };

  const copyResult = async () => {
    const text = exportText();
    try { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 1800); }
    catch (e) { window.prompt('Copie o resultado:', text); }
  };

  const printResultCard = async () => {
    if (!resultCardRef.current || printing) return;
    setPrinting(true);
    try {
      if (window.html2canvas) {
        const canvas = await window.html2canvas(resultCardRef.current, {
          backgroundColor: '#ffffff',
          scale: 2.5,
          useCORS: true,
          logging: false
        });
        const link = document.createElement('a');
        link.download = `honestometro-${safeFileName(teamA)}-x-${safeFileName(teamB)}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } else {
        window.print();
      }
    } catch (e) {
      window.print();
    } finally {
      setPrinting(false);
    }
  };

  const clearTrade = () => { setSideA([]); setSideB([]); setTeamA('Time A'); setTeamB('Time B'); setQueryA(''); setQueryB(''); setManualA(''); setManualB(''); setSelectedA(null); setSelectedB(null); };

  const renderTradeSide = ({ sideName, teamName, setTeamName, side, otherSide, query, setQuery, suggestions }) => {
    const isA = sideName === 'A';
    const selected = isA ? selectedA : selectedB;
    const subtotal = sumPlayers(side);
    const comp = slotCompFor(side, otherSide);
    const total = sideTotal(side, otherSide);
    return (
      <div className="trade-side-box">
        <div className="trade-side-top"><div className="trade-side-kicker">Pacote do lado {sideName}</div><input className="trade-team-input" value={teamName} onChange={e => setTeamName(e.target.value)} /></div>
        <div className="trade-add-row">
          <div className="trade-add-wrap">
            <input className="trade-lab-input" value={query} onChange={e => { setQuery(e.target.value); if (isA) setSelectedA(null); else setSelectedB(null); }} onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); if (suggestions[0] && !selected) pickSuggestion(sideName, suggestions[0]); else addPlayer(sideName); } }} placeholder="Digite o nome: Pay, Jokic, Duren..." />
            {query && suggestions.length > 0 && !(selected && selected.name === query) && (
              <div className="trade-suggestions">
                {suggestions.map(p => (
                  <div className="trade-suggestion" key={p.id} onClick={() => pickSuggestion(sideName, p)}>
                    <div className="trade-suggestion-main"><PlayerPhoto player={p} size={38} /><div><div className="trade-suggestion-name">{p.name}</div><div className="trade-suggestion-meta">{p.team} • {p.position} • {p.fantasyTeam || p.status}</div></div></div>
                    <div className="trade-suggestion-score"><span>AVG {Number(p.fantasyPoints).toFixed(1)}</span><small>TOTAL {formatNumber(p.totalPoints)}</small></div>
                  </div>
                ))}
              </div>
            )}
          </div>
          <button className="trade-add-btn" onClick={() => addPlayer(sideName)} disabled={!query.trim()}>+</button>
        </div>
        {selected && selected.name === query && (
          <React.Fragment>
            <div className="trade-selected-preview"><PlayerPhoto player={selected} size={42} /><div><div className="trade-selected-preview-name">{selected.name}</div><div className="trade-selected-preview-meta">{selected.team} • {selected.position} • {selected.fantasyTeam || selected.status}</div></div></div>
            <div className="trade-selected-stats">
              <div><span>AVG ESPN</span><strong>{Number(selected.fantasyPoints).toFixed(1)}</strong></div>
              <div><span>TOTAL ESPN</span><strong>{formatNumber(selected.totalPoints)}</strong></div>
            </div>
          </React.Fragment>
        )}
        <div className="trade-search-hint">Ao selecionar um jogador da lista, o AVG, o TOTAL e o time fantasy da ESPN entram automaticamente. Se o jogador tiver dono, o lado da troca será renomeado com esse time; se digitar manual/FA, será usado o piso de {FLOOR_AVG} no cálculo.</div>
        <div className="trade-player-list">
          {side.length === 0 && <div className="trade-empty-state">Busque um jogador para montar este lado da troca.</div>}
          {side.map(p => { const c = calcPlayer(p); return (
            <div className="trade-player-row-new" key={p.id}>
              <div className="trade-player-info-new"><PlayerPhoto player={p} size={40} /><div className="trade-player-info-text"><div className="trade-player-name-new">{p.name}</div><div className="trade-player-meta-new"><span>{p.team}</span><span>•</span><span>{p.position}</span><span>•</span><span>{p.fantasyTeam || p.status}</span><span>•</span><span>TOTAL {formatNumber(p.totalPoints)}</span></div></div></div>
              <div className="trade-player-avg-new"><div className="trade-player-avg-label">AVG</div><div className="trade-player-avg-value">{c.rawAvg.toFixed(1)}</div></div>
              <div><div className="trade-player-value-new">{c.value}</div><div className="trade-player-value-sub">{c.effectiveAvg.toFixed(1)} × {c.multiplierLabel}</div></div>
              <button className="trade-remove-btn" onClick={() => removePlayer(sideName, p.id)}>×</button>
            </div>
          ); })}
        </div>
        {comp > 0 && <div className="slot-comp-row"><span>Compensação por {otherSide.length - side.length} slot(s) livre(s)</span><span className="slot-comp-value">+{comp}</span></div>}
        <div className="trade-side-total"><div><div className="trade-side-total-label">Total do lado</div><div style={{fontSize:10, color:'rgba(255,255,255,.56)', marginTop:3}}>Jogadores {subtotal} {comp ? `+ slots ${comp}` : ''}</div></div><div className="trade-side-total-value">{total}</div></div>
      </div>
    );
  };

  return (
    <div className="main-wrap">
      <div className="honest-hero"><div className="honest-kicker">Ferramenta oficial de auditoria</div><div className="honest-title">⚖️ Honestômetro</div><div className="honest-text">Calculadora oficial da AirBall Dynasty League com dados da ESPN Fantasy, piso mínimo de Free Agent, multiplicadores por faixa de AVG e compensação automática de slots.</div></div>
      <div className="trade-lab-shell">
        <div className="trade-lab-card">
          <div className="trade-lab-header"><div><div className="trade-lab-title">AirBall Trade Lab</div><div className="trade-lab-subtitle">Base ESPN Fantasy • Temporada {HONESTOMETRO_CONFIG.seasonId}</div><div className="trade-api-status"><span style={{display:'flex', alignItems:'center', gap:8}}><span className={`trade-status-dot ${dataLive ? 'live' : ''}`}></span>{dataStatus}</span><span>{players.length} atletas</span></div></div><div className="trade-lab-pill">Regras oficiais</div></div>
          <div className="trade-lab-body">
            <div className="trade-rules-grid"><div className="trade-rule-badge"><div className="trade-rule-badge-label">Piso</div><div className="trade-rule-badge-value">20 pts</div></div><div className="trade-rule-badge"><div className="trade-rule-badge-label">Slots</div><div className="trade-rule-badge-value">+20 cada</div></div><div className="trade-rule-badge"><div className="trade-rule-badge-label">Aprovação</div><div className="trade-rule-badge-value">&lt; 10%</div></div><div className="trade-rule-badge"><div className="trade-rule-badge-label">Regra 1x1</div><div className="trade-rule-badge-value">AVG &lt; 3</div></div><div className="trade-rule-badge"><div className="trade-rule-badge-label">Busca</div><div className="trade-rule-badge-value">ESPN</div></div></div>
            <div className="trade-sides-grid">
              {renderTradeSide({ sideName: 'A', teamName: teamA, setTeamName: setTeamA, side: sideA, otherSide: sideB, query: queryA, setQuery: setQueryA, suggestions: suggestionsA })}
              {renderTradeSide({ sideName: 'B', teamName: teamB, setTeamName: setTeamB, side: sideB, otherSide: sideA, query: queryB, setQuery: setQueryB, suggestions: suggestionsB })}
            </div>
          </div>
        </div>
        <div className="trade-lab-card trade-result-panel">
          <div ref={resultCardRef} id="trade-result-card" className="trade-result-print-card">
            <div className="trade-result-score"><div className="trade-result-label">Parecer do Honestômetro</div><div className="trade-result-verdict">{verdict.label}</div><div className="trade-result-diff">Diferença: {diffPct}%</div></div>

function DraftTop50Players() {
  const PLAYERS_API_URL = 'https://airball-espn-proxy.stefanocecin.workers.dev/players';
  const [players, setPlayers] = useState([]);
  const [status, setStatus] = useState('Carregando ESPN...');

  const normalizeText = (value) => String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .trim();

  const cleanLeaguePosition = (position) => {
    const allowed = ['PG', 'SG', 'SF', 'PF', 'C'];
    const raw = String(position || '')
      .toUpperCase()
      .replace(/[^A-Z/ ,.-]/g, ' ')
      .split(/[\/\s,.-]+/)
      .filter(Boolean);
    const filtered = raw.filter(pos => allowed.includes(pos));
    return [...new Set(filtered)].join('/') || '—';
  };

  const normalizeDraftPlayer = (p, index) => {
    const id = String(p.id || p.playerId || p.espnId || `${p.name || 'player'}-${index}`);
    const name = p.name || p.fullName || p.playerName || p.displayName || 'Jogador sem nome';
    const avg = Number(p.fantasyPoints ?? p.avgFantasyPoints ?? p.averageFantasyPoints ?? p.avg ?? p.appliedAverage ?? 0) || 0;
    const total = Number(p.totalPoints ?? p.totalFantasyPoints ?? p.total ?? p.appliedTotal ?? 0) || 0;
    const workerOrigin = (() => { try { return new URL(PLAYERS_API_URL).origin; } catch (e) { return ''; } })();
    const workerPhotoUrl = workerOrigin && /^\d+$/.test(id) ? `${workerOrigin}/player-photo/${id}` : '';
    return {
      id,
      name,
      fantasyPoints: Number(avg.toFixed(1)),
      totalPoints: Number(total.toFixed(1)),
      position: cleanLeaguePosition(p.position || p.defaultPosition || p.eligibleSlotsText || (Array.isArray(p.positions) ? p.positions.join('/') : '') || '—'),
      team: p.team || p.proTeam || p.proTeamAbbrev || p.nbaTeam || 'NBA',
      fantasyTeam: p.fantasyTeam || p.owner || p.fantasyOwner || 'Livre',
      photoUrl: p.photoUrl || p.headshotUrl || p.playerPhoto || p.photo || workerPhotoUrl
    };
  };

  const isKeeperOrOwned = (player) => {
    const team = normalizeText(player.fantasyTeam);
    if (!team) return false;
    const freeLabels = new Set(['livre', 'free agent', 'fa', 'waiver', 'waivers', '-', '—']);
    return !freeLabels.has(team);
  };

  useEffect(() => {
    fetch(PLAYERS_API_URL)
      .then(res => {
        if (!res.ok) throw new Error('Erro HTTP ' + res.status);
        return res.json();
      })
      .then(data => {
        const list = Array.isArray(data) ? data : (data.players || data.items || []);
        const normalized = list
          .map(normalizeDraftPlayer)
          .filter(p => p.name && Number(p.fantasyPoints) > 0);
        const pool = normalized
          .filter(p => !isKeeperOrOwned(p))
          .sort((a, b) => b.fantasyPoints - a.fantasyPoints)
          .slice(0, 50);
        setPlayers(pool);
        setStatus(`${pool.length} jogadores disponíveis`);
      })
      .catch(() => {
        setStatus('Erro ao carregar ESPN');
        setPlayers([]);
      });
  }, []);

  return (
    <div className="draft-top50-card">
      <div className="draft-top50-header">
        <div>
          <div className="draft-top50-kicker">Board automático ESPN</div>
          <div className="draft-top50-title">Top 50 disponíveis do Draft</div>
          <div className="draft-top50-sub">Lista pelos maiores AVG da ESPN, excluindo jogadores que aparecem vinculados a franquias/keepers na liga. Mostra 10 por vez; role para ver o Top 50 completo.</div>
        </div>
        <div className="draft-top50-status">{status}</div>
      </div>

      <div className="draft-top50-table">
        {players.length ? players.map((p, i) => (
          <div className="draft-top50-row" key={p.id || `${p.name}-${i}`}>
            <div className="draft-top50-rank">{i + 1}</div>
            <PlayerPhoto player={p} size={69} />
            <div className="draft-top50-player">
              <div className="draft-top50-name">{p.name}</div>
              <div className="draft-top50-meta">{p.team} • {p.position}</div>
            </div>
            <div className="draft-top50-chip">{p.position}</div>
            <div className="draft-top50-stat">
              <span className="draft-top50-stat-label">AVG</span>
              <span className="draft-top50-stat-value">{p.fantasyPoints.toFixed(1)}</span>
            </div>
            <div className="draft-top50-stat">
              <span className="draft-top50-stat-label">TOTAL</span>
              <span className="draft-top50-stat-value">{Math.round(p.totalPoints).toLocaleString('pt-BR')}</span>
            </div>
            <div className="draft-top50-free">Disponível</div>
          </div>
        )) : (
          <div className="draft-top50-empty">
            Nenhum jogador disponível carregado ainda. Confirme se o Worker está ativo e se os keepers/rosters da ESPN estão atualizados.
          </div>
        )}
      </div>
    </div>
  );
}
