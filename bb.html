function DraftDrawPage() {
  const STORAGE_KEY = 'airball-draft-sorteio-2026-27-v5-custom-sound-result-ball';
  const CUSTOM_DRAFT_DRAW_SOUND_URL = 'assets/audio/draft-sortear.mp3';

  const getLotteryGroups = () => DRAFT_LOTTERIES.map((lottery, index) => {
    const isPlayoff = index === 1;
    const pickStart = isPlayoff ? 9 : 1;
    const pickEnd = isPlayoff ? 16 : 8;

    return {
      id: isPlayoff ? 'playoffs' : 'nonplayoffs',
      label: isPlayoff ? 'Times de Playoffs' : 'Times fora dos Playoffs',
      shortLabel: isPlayoff ? 'Playoffs' : 'Fora dos playoffs',
      title: lottery.title,
      subtitle: lottery.subtitle,
      pickStart,
      pickEnd,
      rows: lottery.rows.map(row => {
        const teamData = getTeam(row.team);
        const priority = Number(row.original);
        return {
          priority,
          team: row.team,
          display: row.display || teamData.name,
          gm: teamData.gm,
          chance: Number(row.chance) || 0,
          idealPick: pickStart + priority - 1,
          groupId: isPlayoff ? 'playoffs' : 'nonplayoffs',
          groupLabel: isPlayoff ? 'Times de Playoffs' : 'Times fora dos Playoffs',
          groupShortLabel: isPlayoff ? 'Playoffs' : 'Fora dos playoffs',
          pickStart,
          pickEnd
        };
      })
    };
  });

  const lotteryGroups = getLotteryGroups();

  const randomFloat = () => {
    try {
      if (window.crypto && window.crypto.getRandomValues) {
        const arr = new Uint32Array(1);
        window.crypto.getRandomValues(arr);
        return arr[0] / 4294967296;
      }
    } catch (e) {}
    return Math.random();
  };

  const calculateBasePickChances = (rows) => {
    const safeRows = Array.isArray(rows) ? rows : [];
    const n = safeRows.length;
    const empty = {};
    if (!n) return empty;

    const weights = safeRows.map(row => Math.max(0, Number(row.chance) || 0));
    const totalWeight = weights.reduce((sum, value) => sum + value, 0);

    if (totalWeight <= 0) {
      const even = 100 / n;
      return safeRows.reduce((acc, row) => {
        acc[normalizeTeamKey(row.team)] = even;
        return acc;
      }, {});
    }

    return safeRows.reduce((acc, row, index) => {
      acc[normalizeTeamKey(row.team)] = (weights[index] / totalWeight) * 100;
      return acc;
    }, {});
  };

  const calculateCurrentPickChances = (rows) => {
    const safeRows = Array.isArray(rows) ? rows : [];
    const n = safeRows.length;
    const empty = {};
    if (!n) return empty;
    if (n === 1) {
      return { [normalizeTeamKey(safeRows[0].team)]: 100 };
    }

    const weights = safeRows.map(row => Math.max(0, Number(row.chance) || 0));
    const totalWeight = weights.reduce((sum, value) => sum + value, 0);

    if (totalWeight <= 0) {
      const even = 100 / n;
      return safeRows.reduce((acc, row) => {
        acc[normalizeTeamKey(row.team)] = even;
        return acc;
      }, {});
    }

    const fullMask = (1 << n) - 1;
    const lastProbFor = (targetIndex) => {
      const targetBit = 1 << targetIndex;
      const memo = new Map();

      const recur = (mask) => {
        if (mask === targetBit) return 1;
        if (!(mask & targetBit)) return 0;
        if (memo.has(mask)) return memo.get(mask);

        let total = 0;
        for (let i = 0; i < n; i += 1) {
          if (mask & (1 << i)) total += weights[i];
        }

        if (total <= 0) {
          let count = 0;
          for (let i = 0; i < n; i += 1) if (mask & (1 << i)) count += 1;
          return 1 / Math.max(1, count);
        }

        let probability = 0;
        for (let i = 0; i < n; i += 1) {
          const bit = 1 << i;
          if (!(mask & bit) || i === targetIndex) continue;
          probability += (weights[i] / total) * recur(mask ^ bit);
        }

        memo.set(mask, probability);
        return probability;
      };

      return recur(fullMask) * 100;
    };

    const raw = safeRows.map((row, index) => ({
      key: normalizeTeamKey(row.team),
      value: lastProbFor(index)
    }));
    const rawTotal = raw.reduce((sum, row) => sum + row.value, 0) || 100;

    return raw.reduce((acc, row) => {
      acc[row.key] = (row.value / rawTotal) * 100;
      return acc;
    }, {});
  };

  const pickByChanceMap = (rows, chanceMap) => {
    const weightedRows = rows.map(row => ({
      row,
      weight: Math.max(0, Number(chanceMap[normalizeTeamKey(row.team)]) || 0)
    }));
    const total = weightedRows.reduce((sum, item) => sum + item.weight, 0);
    if (total <= 0) return rows[Math.floor(randomFloat() * rows.length)];

    let roll = randomFloat() * total;
    for (const item of weightedRows) {
      roll -= item.weight;
      if (roll <= 0) return item.row;
    }
    return weightedRows[weightedRows.length - 1].row;
  };

  const readStoredState = () => {
    try {
      const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const results = Array.isArray(parsed.results) ? parsed.results : [];
      return { results };
    } catch (e) {
      return { results: [] };
    }
  };

  const [drawState, setDrawState] = useState(readStoredState);
  const [drawAnimation, setDrawAnimation] = useState({ active: false, countdown: null, pick: null, phase: '', chosen: null });
  const [drawPopup, setDrawPopup] = useState(null);
  const drawTimersRef = useRef([]);
  const results = Array.isArray(drawState.results) ? drawState.results : [];
  const isDrawing = !!drawAnimation.active;

  const clearDraftDrawTimers = () => {
    drawTimersRef.current.forEach(timer => clearTimeout(timer));
    drawTimersRef.current = [];
  };

  useEffect(() => {
    return () => clearDraftDrawTimers();
  }, []);

  useEffect(() => {
    const closeOnEscape = (event) => {
      if (event.key === 'Escape') setDrawPopup(null);
    };
    window.addEventListener('keydown', closeOnEscape);
    return () => window.removeEventListener('keydown', closeOnEscape);
  }, []);

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(drawState));
    } catch (e) {}
  }, [drawState]);

  const playoffGroup = lotteryGroups.find(group => group.id === 'playoffs');
  const nonPlayoffGroup = lotteryGroups.find(group => group.id === 'nonplayoffs');
  const playoffDrawn = results.filter(row => row.groupId === 'playoffs').length;
  const nonPlayoffDrawn = results.filter(row => row.groupId === 'nonplayoffs').length;

  const upcomingGroup = playoffDrawn < 8 ? playoffGroup : nonPlayoffGroup;
  const nextPick = playoffDrawn < 8
    ? 16 - playoffDrawn
    : (nonPlayoffDrawn < 8 ? 8 - nonPlayoffDrawn : null);
  const lastDraw = results[0] || null;

  const drawnTeams = new Set(results.map(row => normalizeTeamKey(row.team)));
  const visiblePool = nextPick
    ? upcomingGroup.rows.filter(row => !drawnTeams.has(normalizeTeamKey(row.team)))
    : [];
  const currentPickChances = calculateCurrentPickChances(visiblePool);
  const basePickChances = calculateBasePickChances(visiblePool);

  const playDraftDrawSound = () => {
    const playFallbackSynth = () => {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        const ctx = new AudioContextClass();
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.055, ctx.currentTime);
        master.connect(ctx.destination);

        const now = ctx.currentTime;
        const notes = [174, 207, 246, 293, 349, 440, 554, 698];
        notes.forEach((freq, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const start = now + index * 0.085;
          osc.type = index % 2 ? 'triangle' : 'sine';
          osc.frequency.setValueAtTime(freq, start);
          gain.gain.setValueAtTime(0.001, start);
          gain.gain.exponentialRampToValueAtTime(0.8, start + 0.012);
          gain.gain.exponentialRampToValueAtTime(0.001, start + 0.075);
          osc.connect(gain);
          gain.connect(master);
          osc.start(start);
          osc.stop(start + 0.09);
        });

        const finalOsc = ctx.createOscillator();
        const finalGain = ctx.createGain();
        finalOsc.type = 'sawtooth';
        finalOsc.frequency.setValueAtTime(220, now + 2.45);
        finalOsc.frequency.exponentialRampToValueAtTime(880, now + 2.88);
        finalGain.gain.setValueAtTime(0.001, now + 2.45);
        finalGain.gain.exponentialRampToValueAtTime(0.65, now + 2.52);
        finalGain.gain.exponentialRampToValueAtTime(0.001, now + 3.02);
        finalOsc.connect(finalGain);
        finalGain.connect(master);
        finalOsc.start(now + 2.45);
        finalOsc.stop(now + 3.05);

        setTimeout(() => ctx.close().catch(() => {}), 3600);
      } catch (e) {}
    };

    try {
      const audio = new Audio(`${CUSTOM_DRAFT_DRAW_SOUND_URL}?v=1`);
      audio.preload = 'auto';
      audio.volume = 1;
      const playAttempt = audio.play();
      if (playAttempt && typeof playAttempt.catch === 'function') {
        playAttempt.catch(() => playFallbackSynth());
      }
    } catch (e) {
      playFallbackSynth();
    }
  };


  const drawNext = () => {
    if (!nextPick || !visiblePool.length || isDrawing) return;

    clearDraftDrawTimers();
    playDraftDrawSound();

    const chosen = pickByChanceMap(visiblePool, currentPickChances);
    const chanceForPick = Number(currentPickChances[normalizeTeamKey(chosen.team)] || 0);
    const baseChanceForPickStart = Number(basePickChances[normalizeTeamKey(chosen.team)] || 0);
    const movement = Number(chosen.idealPick) - Number(nextPick);

    const nextResult = {
      ...chosen,
      pick: nextPick,
      movement,
      currentChance: chanceForPick,
      baseChance: baseChanceForPickStart,
      drawnAt: new Date().toISOString()
    };

    setDrawAnimation({
      active: true,
      countdown: 3,
      pick: nextPick,
      phase: 'Girando a urna...',
      chosen: null
    });

    drawTimersRef.current = [
      setTimeout(() => setDrawAnimation(prev => ({ ...prev, countdown: 2, phase: 'Misturando as bolinhas...' })), 900),
      setTimeout(() => setDrawAnimation(prev => ({ ...prev, countdown: 1, phase: 'Preparando o resultado...' })), 1800),
      setTimeout(() => {
        setDrawAnimation(prev => ({ ...prev, countdown: '!', phase: 'Bola sorteada!', chosen: nextResult }));
        setDrawPopup(nextResult);
      }, 2700),
      setTimeout(() => {
        setDrawState(prev => {
          const currentResults = Array.isArray(prev.results) ? prev.results : [];
          return { results: [nextResult, ...currentResults] };
        });
      }, 3350),
      setTimeout(() => {
        setDrawAnimation({ active: false, countdown: null, pick: null, phase: '', chosen: null });
        drawTimersRef.current = [];
      }, 4300)
    ];
  };

  const resetDraw = () => {
    if (isDrawing) return;
    const ok = window.confirm('Resetar o sorteio do draft e voltar todos os times para as urnas?');
    if (ok) {
      setDrawPopup(null);
      setDrawState({ results: [] });
    }
  };

  const movementInfo = (movement) => {
    if (movement > 0) return { cls: 'gain', arrow: '↑', text: `Ganhou ${movement}` };
    if (movement < 0) return { cls: 'loss', arrow: '↓', text: `Perdeu ${Math.abs(movement)}` };
    return { cls: 'same', arrow: '→', text: 'Manteve' };
  };

  const chanceText = (value) => {
    const number = Number(value) || 0;
    const decimals = number > 0 && number < 10 ? 2 : 1;
    return `${number.toLocaleString('pt-BR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals })}%`;
  };

  return (
    <div className="main-wrap draft-page">
      <div className="page-hero">
        <div className="page-hero-title">🎲 Sorteio Draft</div>
        <div className="page-hero-sub">Sorteio interativo da ordem do Draft 2026/27 • duas urnas separadas: picks 1-8 e picks 9-16</div>
      </div>

      {drawPopup && (
        <div className="draft-draw-popup-backdrop" onClick={() => setDrawPopup(null)}>
          <div className="draft-draw-popup-card" onClick={(event) => event.stopPropagation()}>
            <button className="draft-draw-popup-close" type="button" onClick={() => setDrawPopup(null)} aria-label="Fechar resultado">×</button>
            <div className="draft-draw-popup-kicker">Resultado do sorteio</div>
            <div className="draft-draw-popup-pick">Pick #{drawPopup.pick}</div>
            <div className="draft-draw-popup-ball">
              <TeamLogo team={drawPopup.team} size={150} />
            </div>
            <div className="draft-draw-popup-team">{drawPopup.display}</div>
            <div className="draft-draw-popup-sub">
              {drawPopup.groupShortLabel} • Prioridade #{drawPopup.priority} • Chance da pick: {chanceText(drawPopup.currentChance ?? drawPopup.chance)}
            </div>
            <button className="draft-draw-popup-confirm" type="button" onClick={() => setDrawPopup(null)}>Continuar sorteio</button>
          </div>
        </div>
      )}

      <div className="draft-draw-card">
        <div className="draft-draw-header">
          <div>
            <div className="draft-draw-kicker">Regras oficiais do draft</div>
            <div className="draft-draw-title">Sorteio do Draft AirBall</div>
            <div className="draft-draw-sub">
              O sorteio respeita as porcentagens de cada equipe e a separação oficial da liga: times fora dos playoffs disputam apenas as picks 1 a 8; times que foram aos playoffs disputam apenas as picks 9 a 16. A revelação acontece de trás para frente, com contagem regressiva, urna animada e som a cada clique. As porcentagens mudam a cada sorteio: Pick #9/Pick #1 mostra a chance atual da melhor pick da urna, e a coluna roxa mostra a chance real da pick que está sendo sorteada agora.
            </div>
          </div>
          <div className="draft-draw-nextpick">
            <div className="draft-draw-nextpick-label">Próximo sorteio</div>
            <div className="draft-draw-nextpick-value">{nextPick ? `#${nextPick}` : 'FIM'}</div>
          </div>
        </div>

        <div className="draft-draw-body">
          <div className="draft-draw-panel">
            <div className="draft-draw-panel-head">
              <div>
                <div className="draft-draw-panel-title">Urna atual</div>
                <div className="draft-draw-group-pill">
                  {nextPick ? `${upcomingGroup.shortLabel} • Sorteando pick #${nextPick}` : 'Sorteio finalizado'}
                </div>
              </div>
              <div className="draft-draw-panel-count">{visiblePool.length}/8 times</div>
            </div>
            <div className="draft-draw-pool">
              {visiblePool.map(row => {
                const currentChance = currentPickChances[normalizeTeamKey(row.team)] || 0;
                const baseChance = basePickChances[normalizeTeamKey(row.team)] || 0;
                return (
                  <div className="draft-draw-pool-row" key={`${upcomingGroup.id}-${row.team}`}>
                    <div className="draft-draw-priority">#{row.priority}</div>
                    <TeamLogo team={row.team} size={44} />
                    <div>
                      <div className="draft-draw-team-name">{row.display}</div>
                      <div className="draft-draw-team-gm">GM: {row.gm || '—'} • pick base #{row.idealPick}</div>
                    </div>
                    <div className="draft-draw-score">
                      <span className="draft-draw-score-label">Pick #{upcomingGroup.pickStart}</span>
                      {chanceText(baseChance)}
                    </div>
                    <div className="draft-draw-current-odds">
                      <span className="draft-draw-current-odds-label">Pick #{nextPick}</span>
                      {chanceText(currentChance)}
                    </div>
                  </div>
                );
              })}
              {!visiblePool.length && <div className="draft-draw-empty">Sorteio finalizado ou esta urna já foi concluída.</div>}
            </div>
          </div>

          <div>
            <div className="draft-draw-actions">
              <button className="draft-draw-btn draft-draw-btn-primary" onClick={drawNext} disabled={!nextPick || isDrawing}>
                {isDrawing ? `Sorteando pick ${drawAnimation.pick}...` : (nextPick ? `Sortear pick ${nextPick}` : 'Sorteio concluído')}
              </button>
              <button className="draft-draw-btn draft-draw-btn-secondary" onClick={resetDraw} disabled={!results.length || isDrawing}>
                Resetar
              </button>
            </div>
            <div className="draft-draw-sound-note">
              <strong>Som personalizado:</strong> coloque seu áudio em <strong>assets/audio/draft-sortear.mp3</strong>. Se o arquivo não existir, o sistema usa o som padrão do navegador.
            </div>

            {drawAnimation.active && (
              <div className="draft-draw-animation-card">
                <div className="draft-draw-animation-layout">
                  {drawAnimation.chosen ? (
                    <div className="draft-draw-result-reveal" aria-hidden="true">
                      <div className="draft-draw-result-ball">
                        <TeamLogo team={drawAnimation.chosen.team} size={72} />
                      </div>
                    </div>
                  ) : (
                    <div className="draft-draw-urn" aria-hidden="true">
                      <span className="draft-draw-ball"></span>
                      <span className="draft-draw-ball"></span>
                      <span className="draft-draw-ball"></span>
                      <span className="draft-draw-ball"></span>
                      <span className="draft-draw-ball"></span>
                    </div>
                  )}
                  <div>
                    <div className="draft-draw-animation-kicker">{drawAnimation.chosen ? 'Resultado revelado' : 'Urna AirBall em movimento'}</div>
                    <div className="draft-draw-animation-title">{drawAnimation.chosen ? drawAnimation.chosen.display : `Sorteando pick #${drawAnimation.pick}`}</div>
                    <div className="draft-draw-animation-sub">
                      {drawAnimation.chosen
                        ? `Pick #${drawAnimation.chosen.pick} definida para ${drawAnimation.chosen.display}. Chance usada no momento do sorteio: ${chanceText(drawAnimation.chosen.currentChance ?? drawAnimation.chosen.chance)}.`
                        : `${drawAnimation.phase} O time só será revelado quando a contagem terminar.`}
                    </div>
                  </div>
                  <div className="draft-draw-countdown">{drawAnimation.countdown}</div>
                </div>
              </div>
            )}

            {lastDraw && (
              <div className="draft-draw-current">
                <div className="draft-draw-current-label">
                  Último sorteado • {lastDraw.groupShortLabel} • Chance para pick #{lastDraw.pick}: {chanceText(lastDraw.currentChance ?? lastDraw.chance)}
                </div>
                <div className="draft-draw-current-main">
                  <TeamLogo team={lastDraw.team} size={56} />
                  <div>
                    <div className="draft-draw-current-team">{lastDraw.display}</div>
                    <div className="draft-draw-team-gm">Prioridade #{lastDraw.priority} na urna • pick base #{lastDraw.idealPick} • chance pick #{lastDraw.pickStart}: {chanceText(lastDraw.baseChance ?? lastDraw.chance)} • GM: {lastDraw.gm || '—'}</div>
                  </div>
                  <div className="draft-draw-current-pick">Pick #{lastDraw.pick}</div>
                </div>
              </div>
            )}

            <div className="draft-draw-panel">
              <div className="draft-draw-panel-head">
                <div className="draft-draw-panel-title">Resultado do sorteio</div>
                <div className="draft-draw-panel-count">{results.length} sorteados</div>
              </div>
              <div className="draft-draw-results-scroll">
                {results.length ? (
                  <table className="draft-draw-table">
                    <thead>
                      <tr>
                        <th>Prioridade</th>
                        <th>Time</th>
                        <th>Chance da pick</th>
                        <th>Pick sorteado</th>
                        <th>Variação</th>
                      </tr>
                    </thead>
                    <tbody>
                      {results.map(row => {
                        const move = movementInfo(Number(row.movement));
                        return (
                          <tr key={`${row.team}-${row.pick}`}>
                            <td>#{row.priority}</td>
                            <td>
                              <div className="draft-draw-result-team">
                                <TeamLogo team={row.team} size={36} />
                                <div>
                                  <div className="draft-draw-result-name">{row.display}</div>
                                  <div className="draft-draw-result-sub">{row.groupShortLabel}</div>
                                </div>
                              </div>
                            </td>
                            <td>
                              <div className="draft-draw-chance-cell">
                                <strong>{chanceText(row.currentChance ?? row.chance)}</strong>
                                <span>Pick #{row.pickStart} {chanceText(row.baseChance ?? row.chance)}</span>
                              </div>
                            </td>
                            <td>#{row.pick}</td>
                            <td><span className={`draft-draw-move ${move.cls}`}>{move.arrow} {move.text}</span></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                ) : (
                  <div className="draft-draw-empty">
                    Nenhum time sorteado ainda. Clique em “Sortear pick 16” para começar pela urna dos playoffs com a urna animada e contagem regressiva. As colunas de chance são recalculadas automaticamente a cada time sorteado.
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      </div>

      <DraftPrioritySection />
      <DraftBasisTables />
    </div>
  );
}

function DraftBasisTables() {
  const displayName = (row) => row.display || getTeam(row.team).name;

  const TableCard = ({ title, rows, showPlayoff }) => (
    <div className="draft-basis-card">
      <div className="draft-basis-card-head">
        <div className="draft-basis-card-title">{title}</div>
      </div>
      <div>
        {rows.map(row => (
          <div className={`draft-basis-row ${showPlayoff && row.playoffs ? 'playoff-row' : ''}`} key={`${title}-${row.rank}`}>
            <div className="draft-basis-rank">{row.rank}</div>
            <TeamLogo team={row.team} size={30} />
            <div className="draft-basis-team">{displayName(row)}</div>
            <div className="draft-basis-value">{row.value}</div>
          </div>
        ))}
      </div>
    </div>
  );

  const PriorityFormulaCard = () => (
    <div className="draft-basis-card priority-formula-card">
      <div className="draft-basis-card-head">
        <div className="draft-basis-card-title">Índice de Prioridade</div>
      </div>
      <div className="draft-formula-scroll">
        <div className="draft-formula-header">
          <span>#</span>
          <span></span>
          <span>Time</span>
          <span>Posição Keeper</span>
          <span>+</span>
          <span>Posição Classificação</span>
          <span>=</span>
          <span>Total</span>
        </div>
        {DRAFT_PRIORITY_TABLE.map(row => (
          <div className={`draft-formula-row ${row.playoffs ? 'playoff-row' : ''}`} key={`priority-formula-${row.rank}`}>
            <div className="draft-basis-rank">{row.rank}</div>
            <TeamLogo team={row.team} size={30} />
            <div className="draft-basis-team">{displayName(row)}</div>
            <div className="formula-col">{row.keeper}</div>
            <div className="formula-symbol">+</div>
            <div className="formula-col">{row.season}</div>
            <div className="formula-symbol">=</div>
            <div className="formula-total">{row.value}</div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="draft-basis-section">
      <div className="draft-basis-header">
        <div className="draft-basis-title">Base do Índice de Prioridade</div>
        <div className="draft-basis-sub">
          O índice é calculado pela soma entre a posição de força dos keepers e a posição final da temporada anterior. A tabela serve como referência enquanto os keepers ainda não forem oficializados.
        </div>
      </div>
      <div className="draft-basis-grid">
        <TableCard title="Classificação dos Keepers" rows={DRAFT_KEEPER_RANKING} />
        <TableCard title="Posição Temporada 25-26" rows={DRAFT_SEASON_POSITION} />
        <PriorityFormulaCard />
      </div>
      <div className="draft-basis-legend">
        <span className="draft-red-strip"></span>
        <span>A faixa vermelha indica que o time estava nos playoffs e por isso não pode ter picks 1 a 8; esses times entram apenas na loteria das picks 9 a 16. Em caso de empate na soma, fica à frente o time com pior classificação na temporada anterior.</span>
      </div>
    </div>
  );
}

function DraftPage() {
  return (
    <div className="main-wrap draft-page">
      <div className="page-hero">
        <div className="page-hero-title">⭐ Draft</div>
        <div className="page-hero-sub">Draft 2026/27 • sorteio dos seeds em 08/10 e draft oficial em 10/10</div>
      </div>
      <DraftCountdown />
      <DraftTop50Players />
      <DraftPrioritySection />
      <DraftBasisTables />
      <div className="draft-grid">
        <div className="draft-order-card">
          <div className="sidebar-card-header">
            <span className="sidebar-card-title">Ordem do Sorteio 2026/27</span>
          </div>
          <div className="draft-order-list">
            {DRAFT_ORDER.map(p => (
              <div className="draft-pick" key={p.pick}>
                <span className="pick-num">{p.pick}</span>
                <TeamLogo team={p.name} size={102} />
                <div className="pick-info">
                  <div className="pick-team">{p.name}</div>
                  <div className="pick-gm">GM: {p.gm}</div>
                </div>
                <span className={`pick-badge ${p.cls}`}>{p.badge}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="draft-order-card">
          <div className="sidebar-card-header">
            <span className="sidebar-card-title">Datas do Draft</span>
          </div>
          <div className="draft-order-list">
            <div className="draft-pick">
              <span className="pick-num">08</span>
              <div className="pick-info">
                <div className="pick-team">Sorteio dos Seeds</div>
                <div className="pick-gm">Definição da ordem inicial da liga</div>
              </div>
              <span className="pick-badge pick-lottery">OUT</span>
            </div>
            <div className="draft-pick">
              <span className="pick-num">10</span>
              <div className="pick-info">
                <div className="pick-team">Draft AirBall 2026/27</div>
                <div className="pick-gm">Os GMs montam seus elencos</div>
              </div>
              <span className="pick-badge pick-orig">OUT</span>
            </div>
            <div className="draft-pick">
              <span className="pick-num">20</span>
              <div className="pick-info">
                <div className="pick-team">Começo da Temporada</div>
                <div className="pick-gm">Semana 1 oficialmente aberta</div>
              </div>
              <span className="pick-badge pick-orig">OUT</span>
            </div>
          </div>
          <div className="sidebar-card-header" style={{marginTop:0}}>
            <span className="sidebar-card-title">Observações</span>
          </div>
          <div style={{padding:18, fontSize:13, color:'#6B6B7B', lineHeight:1.6}}>
            Stéfano's SuperSonics foi adicionado à aba Draft e aparece com coroa de campeão nas páginas da liga. A ordem exibida aqui pode ser ajustada após o sorteio oficial dos seeds.
          </div>
        </div>
      </div>
    </div>
  );
}


// ==================== APP ====================
function App() {
  const [page, setPage] = useState('HOME');

  const renderPage = () => {
    switch (page) {
      case 'TIMES': return <TeamsPage />;
      case 'REGRAS': return <RulesPage />;
      case 'HONESTÔMETRO': return <HonestometroPage />;
      case 'CALENDÁRIO': return <CalendarPage />;
      case 'HALL DA FAMA': return <HallOfFamePage />;
      case 'TRADES': return <TradesPage />;
      case 'DRAFT': return <DraftPage />;
      case 'SORTEIO DRAFT': return <DraftDrawPage />;
      default: return <HomePage setPage={setPage} />;
    }
  };

  return (
    <div>
      <TopBar activePage={page} setPage={setPage} />
      <Header />
      {renderPage()}
      <footer className="footer">
        <strong>AIRBALL DYNASTY LEAGUE</strong> • Since FEV 2025 • Temporada 2026/27 • Todos os direitos reservados
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
